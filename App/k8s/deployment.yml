apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: app

  template:
    metadata:
      labels:
        app: app

    spec:
      serviceAccountName: app-sa

      containers:
        - name: app
          image: myrepo/app:latest